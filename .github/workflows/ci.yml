name: CI

on:
  push:
    branches: [main, dev, "feat/*", "fix/*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build (all targets)
        run: cargo build --all-targets --verbose
        env:
          # Windows-specific: disable tests that require Unix ptty/signals
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '--cfg skip_unix_tests' || '' }}
      - name: Test
        run: cargo test --all --verbose
        env:
          # Skip Unix-specific tests on Windows
          RUSTFLAGS: ${{ matrix.os == 'windows-latest' && '--cfg skip_unix_tests' || '' }}
        # Handle Windows path separator for file-based tests
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
