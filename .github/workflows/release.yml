# Release workflow for RustCode
# Triggered by git tags matching v* (e.g., v0.1.0, v1.2.3)
# Builds for Linux (x86_64, aarch64), macOS (x86_64, aarch64), Windows (x86_64)
# Creates GitHub Release with binary artifacts, SHA256 checksums, and optional GPG signatures

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 0.2.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  BINARY_NAME: rustcode

jobs:
  # ---------------------------------------------------------------------------
  # Gather metadata: extract version from tag or input
  # ---------------------------------------------------------------------------
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            # Strip leading 'v' from tag ref
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: Check if prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if echo "${VERSION}" | grep -Eq 'alpha|beta|rc|pre'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # Build binaries for each target platform
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: metadata
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    env:
      TARGET: ${{ matrix.target }}
      ARCHIVE_EXT: ${{ matrix.archive_ext }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ${{ env.BINARY_NAME }}

      - name: Prepare artifact
        id: artifact
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          BINARY="${{ env.BINARY_NAME }}"
          VERSION="${{ needs.metadata.outputs.version }}"

          # Source binary path
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            SRC="target/${TARGET}/release/${BINARY}.exe"
          else
            SRC="target/${TARGET}/release/${BINARY}"
          fi

          # Staging directory
          STAGING="${RUNNER_TEMP}/staging/${BINARY}-${TARGET}-v${VERSION}"
          mkdir -p "${STAGING}"

          # Copy binary and supporting files
          cp "${SRC}" "${STAGING}/${BINARY}${{ runner.os == 'Windows' && '.exe' || '' }}"
          cp LICENSE "${STAGING}/" 2>/dev/null || true
          cp README.md "${STAGING}/" 2>/dev/null || true

          # Create archive
          ARCHIVE_NAME="${BINARY}-${TARGET}-v${VERSION}.${{ matrix.archive_ext }}"
          ARCHIVE_PATH="${RUNNER_TEMP}/${ARCHIVE_NAME}"

          if [[ "${{ matrix.archive_ext }}" == "tar.gz" ]]; then
            tar czf "${ARCHIVE_PATH}" -C "$(dirname "${STAGING}")" "$(basename "${STAGING}")"
          else
            cd "${STAGING}" && zip -r "${ARCHIVE_PATH}" . && cd -
          fi

          # Generate SHA256
          sha256sum "${ARCHIVE_PATH}" | tee "${ARCHIVE_PATH}.sha256"

          echo "archive_name=${ARCHIVE_NAME}" >> "$GITHUB_OUTPUT"
          echo "archive_path=${ARCHIVE_PATH}" >> "$GITHUB_OUTPUT"
          echo "sha256_path=${ARCHIVE_PATH}.sha256" >> "$GITHUB_OUTPUT"

      - name: Sign binary (optional GPG)
        if: runner.os != 'Windows' && vars.GPG_SIGNING_KEY != ''
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSPHRASE: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          echo "${GPG_SIGNING_KEY}" | gpg --import --batch --yes --passphrase "${GPG_SIGNING_PASSPHRASE}" 2>/dev/null || true
          SIGNING_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG 2>/dev/null | grep sec | head -1 | sed 's/.*\///' | sed 's/ .*//')
          if [[ -n "${SIGNING_KEY_ID}" ]]; then
            gpg --batch --yes --detach-sign --armor \
              --passphrase "${GPG_SIGNING_PASSPHRASE}" \
              --default-key "${SIGNING_KEY_ID}" \
              -o "${{ steps.artifact.outputs.archive_path }}.asc" \
              "${{ steps.artifact.outputs.archive_path }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.target }}
          path: |
            ${{ steps.artifact.outputs.archive_path }}
            ${{ steps.artifact.outputs.archive_path }}.sha256
            ${{ steps.artifact.outputs.archive_path }}.asc
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Create GitHub Release and upload all artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          path: /tmp/release-artifacts
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd /tmp/release-artifacts
          sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS || true
          echo "=== SHA256 Checksums ==="
          cat SHA256SUMS

      - name: Generate release notes
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          TAG="${{ needs.metadata.outputs.tag }}"

          # Collect commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          if [[ -n "${PREV_TAG}" ]]; then
            NOTES=$(git log --oneline --no-decorate "${PREV_TAG}..${TAG}" 2>/dev/null || echo "No changes since previous tag")
          else
            NOTES=$(git log --oneline --no-decorate "$(git rev-list --max-parents=0 HEAD)..${TAG}" 2>/dev/null || echo "Initial release")
          fi

          cat > /tmp/release-body.md <<- BODYEOF
        ## RustCode v${VERSION}

        ### Changes since previous release
        ${NOTES}

        ### SHA256 Checksums
        \`\`\`
        $(cat /tmp/release-artifacts/SHA256SUMS)
        \`\`\`

        ### Installation
        \`\`\`bash
        curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install | bash
        \`\`\`
        BODYEOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.metadata.outputs.version }}"
          TAG="v${VERSION}"

          # Create release with all artifacts
          gh release create "${TAG}" \
            --title "RustCode v${VERSION}" \
            --notes-file /tmp/release-body.md \
            --prerelease="${{ needs.metadata.outputs.is_prerelease }}" \
            --verify-tag \
            /tmp/release-artifacts/*.tar.gz \
            /tmp/release-artifacts/*.zip \
            /tmp/release-artifacts/*.sha256 \
            /tmp/release-artifacts/*.asc \
            /tmp/release-artifacts/SHA256SUMS \
            2>&1 || \
          gh release upload "${TAG}" \
            /tmp/release-artifacts/*.tar.gz \
            /tmp/release-artifacts/*.zip \
            /tmp/release-artifacts/*.sha256 \
            /tmp/release-artifacts/*.asc \
            /tmp/release-artifacts/SHA256SUMS \
            --clobber \
            2>&1
