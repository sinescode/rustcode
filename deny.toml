[advisories]
version = 2
# RUSTSEC-2024-0436: `paste` crate is unmaintained (no CVEs).
# It's a transitive dep of tree-sitter-bash. As a proc-macro crate,
# it compiles at build-time only — no runtime impact. Safe to ignore.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
